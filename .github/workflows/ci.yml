name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '*.py'
              - '*.json'
              - '*.sh'
              - 'requirements*.txt'

  lint:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check crosscheck.py test_crosscheck.py

  typecheck:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install mypy
      - name: Type check with mypy
        run: mypy crosscheck.py test_crosscheck.py --ignore-missing-imports

  test:
    needs: [paths-filter]
    if: needs.paths-filter.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: python3 -m unittest discover -s . -p "test_*.py" -v

  changeset:
    name: changeset
    if: "!startsWith(github.head_ref, 'changeset-release/')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Check if CI-only PR
        id: ci_only
        run: |
          NON_CI=$(git diff origin/${{ github.base_ref }} HEAD --name-only --diff-filter=ACMR | grep -v '^\.github/' || true)
          if [ -z "$NON_CI" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for changeset
        if: steps.ci_only.outputs.skip != 'true'
        run: |
          ADDED=$(git diff origin/${{ github.base_ref }} HEAD --name-only --diff-filter=A | grep -E '^\.changeset/.+\.md$' | grep -vF 'README.md' || true)
          if [ -z "$ADDED" ]; then
            echo "No changeset found. Run 'npx changeset' to document this change."
            echo "See: https://github.com/changesets/changesets"
            exit 1
          fi
          echo "Changeset(s) found:"
          echo "$ADDED"

  ci-status:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - paths-filter
      - lint
      - typecheck
      - test
    if: always()
    steps:
      - name: Check all CI jobs
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"
