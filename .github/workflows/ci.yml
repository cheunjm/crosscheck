name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff mypy

      - name: Lint with ruff
        run: ruff check crosscheck.py test_crosscheck.py

      - name: Type check with mypy
        run: mypy crosscheck.py test_crosscheck.py --ignore-missing-imports

      - name: Run tests
        run: python3 -m unittest discover -s . -p "test_*.py" -v
